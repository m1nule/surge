# > 外部
🇭🇰 香港 = smart, include-other-group=🚀 我的, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇭🇰)|(香港)|(Hong)|(HK)
🇺🇸 美国 = smart, include-other-group=🚀 我的, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇺🇸)|(美国)|(States)|(US)
🇯🇵 日本 = smart, include-other-group=🚀 我的, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇯🇵)|(日本)|(Japan)|(JP)
🇨🇳 台湾 = smart, include-other-group=🚀 我的, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇨🇳)|(台湾)|(Tai)|(TW)
🇰🇷 韩国 = smart, include-other-group=🚀 我的, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇰🇷)|(韩国)|(Korea)|(KR)
🇸🇬 新加坡 = smart, include-other-group=🚀 我的, update-interval=0, no-alert=0, hidden=1, include-all-proxies=0, policy-regex-filter=(🇸🇬)|(新加坡)|(Singapore)|(SG)

[Rule]
# > 广告拦截/隐私保护/病毒拦截/钓鱼和诈骗域名拦截（默认禁用）
# DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject.conf,REJECT
# RULE-SET,https://ruleset.skk.moe/List/non_ip/reject.conf,REJECT,extended-matching
